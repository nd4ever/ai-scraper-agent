<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Azure Headlines</title>
  <style>
    :root {
      --bg: #f6f9fc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --link: #005a9c;
      --accent: #dbeafe;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(1200px 500px at 10% -10%, #dbeafe 0%, transparent 60%),
        radial-gradient(900px 400px at 90% 0%, #e0f2fe 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
    }

    .toolbar {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      border-color: #93c5fd;
      background: #f8fafc;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    h2 {
      margin: 24px 0 6px;
      font-size: 1.2rem;
    }

    .azure-blogs-heading {
      text-decoration: underline;
      text-underline-offset: 3px;
      margin-top: 28px;
      margin-bottom: 8px;
    }

    .blog-category-heading {
      font-style: italic;
      font-weight: normal;
      margin: 18px 0 8px;
      font-size: 1rem;
      color: var(--text);
    }

    .empty-category {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 10px;
    }

    ul {
      list-style: none;
      margin: 12px 0 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    li {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(2, 6, 23, 0.05);
    }

    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge.ga {
      background: #dcfce7;
      color: #166534;
      border-color: #86efac;
    }

    .badge.preview {
      background: #e0f2fe;
      color: #075985;
      border-color: #7dd3fc;
    }

    .badge.retirement {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fca5a5;
    }

    .badge.default {
      background: #f1f5f9;
      color: #334155;
      border-color: #cbd5e1;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .actions-row {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .copy-link-btn {
      padding: 4px 10px;
      font-size: 0.82rem;
      border-radius: 999px;
      background: #f8fafc;
    }

    .learn-more-link {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .empty {
      margin-top: 20px;
      background: var(--accent);
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 14px;
      color: #1e3a8a;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Azure Headlines</h1>
    <p class="sub" id="week-label">Loading week range...</p>
    <div class="toolbar">
      <button id="refresh-btn" type="button">Refresh</button>
      <span id="status" class="status">Loading...</span>
    </div>
    <div id="empty" class="empty" hidden>No items found in output.json.</div>

    <h2>Azure Updates</h2>
    <div class="legend" aria-label="Status legend">
      <span id="legend-ga" class="badge ga">Generally Available (0)</span>
      <span id="legend-public-preview" class="badge preview">Public Preview (0)</span>
      <span id="legend-private-preview" class="badge preview">Private Preview (0)</span>
      <span id="legend-retirement" class="badge retirement">Retirement (0)</span>
    </div>
    <ul id="updates"></ul>

    <h2 class="azure-blogs-heading">Azure Blogs</h2>
    <div id="blogs-container"></div>
  </main>

  <script>
    function toDateText(dateValue) {
      const parsed = new Date(dateValue);
      if (Number.isNaN(parsed.getTime())) {
        return "Unknown date";
      }
      return parsed.toLocaleString();
    }

    function normalizeItems(rawItems) {
      return rawItems
        .filter((item) => item && item.title && item.url)
        .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    }

    function formatWeekLabel(weekStart, weekEnd) {
      const opts = { month: 'short', day: 'numeric', year: 'numeric' };
      const start = new Date(weekStart + 'T00:00:00');
      const end = new Date(weekEnd + 'T00:00:00');
      return `Week of ${start.toLocaleDateString(undefined, opts)} \u2013 ${end.toLocaleDateString(undefined, opts)}`;
    }

    function statusBadgeClass(status) {
      const normalized = String(status || "").toLowerCase();
      if (normalized === "generally available") return "ga";
      if (normalized.includes("preview")) return "preview";
      if (normalized.includes("retirement")) return "retirement";
      return "default";
    }

    function getDisplayUpdateTitle(item) {
      const status = String(item?.status || "").trim();
      const title = String(item?.title || "").trim();
      if (!status) return title;
      const lowerStatus = status.toLowerCase();
      if (title.toLowerCase().startsWith(`${lowerStatus}:`)) {
        return title;
      }
      return `${status}: ${title}`;
    }

    function updateLegendCounts(updates) {
      let ga = 0;
      let publicPreview = 0;
      let privatePreview = 0;
      let retirement = 0;

      for (const item of updates) {
        const status = String(item?.status || "").toLowerCase();
        if (status === "generally available") {
          ga += 1;
        } else if (status === "public preview") {
          publicPreview += 1;
        } else if (status === "private preview") {
          privatePreview += 1;
        } else if (status.includes("retirement")) {
          retirement += 1;
        }
      }

      document.getElementById("legend-ga").textContent = `Generally Available (${ga})`;
      document.getElementById("legend-public-preview").textContent = `Public Preview (${publicPreview})`;
      document.getElementById("legend-private-preview").textContent = `Private Preview (${privatePreview})`;
      document.getElementById("legend-retirement").textContent = `Retirement (${retirement})`;
    }

    async function copyTextToClipboard(text) {
      if (!text) return false;
      try {
        if (navigator?.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) {
      }

      try {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(textarea);
        return ok;
      } catch (_) {
        return false;
      }
    }

    function bindCopyButtons(container) {
      const buttons = container.querySelectorAll(".copy-link-btn");
      for (const btn of buttons) {
        btn.addEventListener("click", async () => {
          const url = btn.dataset.url || "";
          const copied = await copyTextToClipboard(url);
          const originalText = btn.textContent;
          btn.textContent = copied ? "Copied" : "Copy failed";
          setTimeout(() => {
            btn.textContent = originalText;
          }, 1200);
        });
      }
    }

    async function loadUpdates() {
      const updatesEl = document.getElementById("updates");
      const blogsContainerEl = document.getElementById("blogs-container");
      const statusEl = document.getElementById("status");
      const emptyEl = document.getElementById("empty");

      statusEl.textContent = "Loading...";
      updatesEl.innerHTML = "";
      blogsContainerEl.innerHTML = "";
      emptyEl.hidden = true;

      try {
        const cacheBust = Date.now();
        const response = await fetch(`output.json?t=${cacheBust}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        const updatesRaw = Array.isArray(payload?.azure_updates) ? payload.azure_updates : [];
        const blogsRaw = Array.isArray(payload?.azure_community_blog_headlines)
          ? payload.azure_community_blog_headlines
          : [];

        const updates = normalizeItems(updatesRaw);
        const blogs = normalizeItems(blogsRaw);

        const weekLabel = document.getElementById("week-label");
        if (payload.week_start && payload.week_end) {
          weekLabel.textContent = formatWeekLabel(payload.week_start, payload.week_end);
        } else {
          weekLabel.textContent = "Loaded from output.json";
        }

        if (!updates.length && !blogs.length) {
          emptyEl.hidden = false;
          statusEl.textContent = "Loaded 0 items";
          return;
        }

        updateLegendCounts(updates);

        const updatesFragment = document.createDocumentFragment();
        for (const item of updates) {
          const li = document.createElement("li");
          const status = item.status || "Unknown";
          const badgeClass = statusBadgeClass(status);
          const displayTitle = getDisplayUpdateTitle(item);
          const learnMore = item.learn_more_url;
          const learnMoreMarkup = learnMore
            ? `<a class="learn-more-link" href="${learnMore}" target="_blank" rel="noopener noreferrer">Learn More</a>`
            : "";
          li.innerHTML = `
            <div class="title-row">
              <a href="${item.url}" target="_blank" rel="noopener noreferrer">${displayTitle}</a>
              <span class="badge ${badgeClass}">${status}</span>
            </div>
            <div class="actions-row">
              <button class="copy-link-btn" type="button" data-url="${item.url}">Copy Link</button>
              ${learnMoreMarkup}
            </div>
            <div class="meta">${toDateText(item.date)}</div>
          `;
          updatesFragment.appendChild(li);
        }

        // Group blogs by category
        const blogsByCategory = {};
        const categoryOrder = [
          'Azure Arc Blog',
          'Azure Architecture Blog',
          'Azure Compute Blog',
          'Azure Governance and Management Blog',
          'Azure Infrastructure Blog',
          'Azure Integration Services Blog',
          'Azure Migration and Modernization Blog',
          'Azure Networking Blog',
          'Azure Observability Blog',
          'Azure Storage Blog',
          'Azure Tools Blog',
          'Azure Virtual Desktop Blog',
          'FinOps Blog',
          'Linux and Open Source Blog',
        ];
        
        for (const item of blogs) {
          const category = item.category || 'Other';
          if (!blogsByCategory[category]) {
            blogsByCategory[category] = [];
          }
          blogsByCategory[category].push(item);
        }

        const blogsFragment = document.createDocumentFragment();
        for (const category of categoryOrder) {
          const categoryItems = blogsByCategory[category] || [];

          const heading = document.createElement("h3");
          heading.className = "blog-category-heading";
          heading.textContent = `${category}: (${categoryItems.length})`;
          blogsFragment.appendChild(heading);

          if (!categoryItems.length) {
            const emptyMessage = document.createElement("div");
            emptyMessage.className = "empty-category";
            emptyMessage.textContent = "No posts for this period.";
            blogsFragment.appendChild(emptyMessage);
            continue;
          }

          const ul = document.createElement("ul");
          for (const item of categoryItems) {
            const li = document.createElement("li");
            li.innerHTML = `
              <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>
              <div class="meta">${toDateText(item.date)}</div>
            `;
            ul.appendChild(li);
          }
          blogsFragment.appendChild(ul);
        }

        updatesEl.appendChild(updatesFragment);
        blogsContainerEl.appendChild(blogsFragment);
        bindCopyButtons(updatesEl);
        statusEl.textContent = `Loaded ${blogs.length} blog headlines and ${updates.length} updates`;
      } catch (error) {
        statusEl.textContent = "Failed to load output.json";
        emptyEl.hidden = false;
        emptyEl.textContent = `Error: ${error.message}`;
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", loadUpdates);
    loadUpdates();
  </script>
</body>
</html>
