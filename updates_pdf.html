<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Azure Updates Weekly Report</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #d0d7e2;
      --accent: #0b5cab;
      --bg: #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.08);
      padding: 26px;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .sub {
      color: var(--muted);
      margin: 8px 0 18px;
      font-size: 0.95rem;
    }

    h2 {
      margin: 22px 0 12px;
      font-size: 1.2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      margin-top: 6px;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
      font-style: italic;
      margin-top: 8px;
    }

    .cards {
      display: grid;
      gap: 16px;
      margin-top: 14px;
    }

    .card {
      border: 1px solid var(--line);
      background: #fff;
    }

    .card-header {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      font-size: 0.96rem;
    }

    .card-body {
      padding: 12px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 1.03rem;
      line-height: 1.35;
    }

    .meta {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .line {
      margin-top: 8px;
      font-size: 0.93rem;
    }

    .links {
      margin: 6px 0 0;
      padding-left: 18px;
    }

    .links li {
      margin: 4px 0;
      line-height: 1.35;
      word-break: break-word;
    }

    a {
      color: #0b5cab;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        background: #fff;
        padding: 0;
      }

      .page {
        box-shadow: none;
        border: none;
        max-width: 100%;
        padding: 12mm;
      }

      .card {
        break-inside: avoid;
      }

      .card-header {
        background-color: var(--accent) !important;
        color: #fff !important;
        border-color: var(--accent) !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Azure Updates Weekly Report</h1>
    <p class="sub" id="week-label">Loading report data...</p>

    <h2>Announcements Summary</h2>
    <table aria-label="Announcements summary table">
      <thead>
        <tr>
          <th>Product Name</th>
          <th>Update Type (Total)</th>
        </tr>
      </thead>
      <tbody id="summary-body"></tbody>
    </table>
    <div id="summary-empty" class="muted" hidden>No Azure updates found for this range.</div>

    <h2>Update Announcements</h2>
    <div id="cards" class="cards"></div>
  </main>

  <script>
    function toDateText(dateValue) {
      const parsed = new Date(dateValue);
      if (Number.isNaN(parsed.getTime())) {
        return "Unknown date";
      }
      return parsed.toLocaleString();
    }

    function formatWeekLabel(weekStart, weekEnd) {
      const opts = { month: "long", day: "numeric", year: "numeric" };
      const start = new Date(weekStart + "T00:00:00");
      const end = new Date(weekEnd + "T00:00:00");
      return `Date Range: ${start.toLocaleDateString(undefined, opts)} - ${end.toLocaleDateString(undefined, opts)}`;
    }

    function normalizeStatus(status) {
      const s = String(status || "").trim().toLowerCase();
      if (!s) return "Unknown";
      if (s.includes("generally available") || s === "launched") return "Generally Available";
      if (s.includes("public preview")) return "Public Preview";
      if (s.includes("private preview")) return "Private Preview";
      if (s.includes("retirement")) return "Retirement";
      return s.replace(/\b\w/g, (m) => m.toUpperCase());
    }

    function normalizeProduct(update) {
      const product = String(update?.product || "").trim();
      const lowered = product.toLowerCase();
      if (!product || lowered === "unknown azure service" || /^azure\s+(in|for|on|with|from)$/i.test(product)) {
        return "General Azure Announcment";
      }
      return product;
    }

    function buildSummaryRows(updates) {
      const byProduct = new Map();

      for (const update of updates) {
        const product = normalizeProduct(update);
        const status = normalizeStatus(update?.status);
        if (!byProduct.has(product)) {
          byProduct.set(product, new Map());
        }
        const perStatus = byProduct.get(product);
        perStatus.set(status, (perStatus.get(status) || 0) + 1);
      }

      const statusOrder = [
        "Retirement",
        "Generally Available",
        "Public Preview",
        "Private Preview",
        "Unknown",
      ];

      return Array.from(byProduct.entries())
        .map(([product, perStatus]) => {
          const statuses = Array.from(perStatus.entries())
            .map(([status, count]) => ({ status, count }))
            .sort((a, b) => {
              const ai = statusOrder.indexOf(a.status);
              const bi = statusOrder.indexOf(b.status);
              if (ai === -1 && bi === -1) return a.status.localeCompare(b.status);
              if (ai === -1) return 1;
              if (bi === -1) return -1;
              return ai - bi;
            });
          return { product, statuses };
        })
        .sort((a, b) => a.product.localeCompare(b.product));
    }

    function dedupeLinks(links) {
      const output = [];
      const seen = new Set();
      for (const link of links || []) {
        const href = String(link || "").trim();
        if (!href || seen.has(href)) continue;
        seen.add(href);
        output.push(href);
      }
      return output;
    }

    async function loadReport() {
      const summaryBodyEl = document.getElementById("summary-body");
      const summaryEmptyEl = document.getElementById("summary-empty");
      const cardsEl = document.getElementById("cards");
      const weekLabelEl = document.getElementById("week-label");

      summaryBodyEl.innerHTML = "";
      cardsEl.innerHTML = "";
      summaryEmptyEl.hidden = true;

      const cacheBust = Date.now();
      const response = await fetch(`output.json?t=${cacheBust}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const payload = await response.json();
      const updates = Array.isArray(payload?.azure_updates)
        ? payload.azure_updates.slice().sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0))
        : [];

      if (payload.week_start && payload.week_end) {
        weekLabelEl.textContent = formatWeekLabel(payload.week_start, payload.week_end);
      } else {
        weekLabelEl.textContent = "Date range unavailable";
      }

      if (!updates.length) {
        summaryEmptyEl.hidden = false;
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.textContent = "No announcement cards to display.";
        cardsEl.appendChild(empty);
        return;
      }

      const summaryRows = buildSummaryRows(updates);
      for (const row of summaryRows) {
        const statusText = row.statuses
          .map((entry) => `${entry.status} - ${entry.count} Update${entry.count === 1 ? "" : "s"}`)
          .join("<br>");
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.product}</td>
          <td>${statusText}</td>
        `;
        summaryBodyEl.appendChild(tr);
      }

      for (const item of updates) {
        const card = document.createElement("section");
        card.className = "card";

        const product = normalizeProduct(item);
        const documentationLinks = dedupeLinks(item.documentation_links).filter((href) => href !== item.url);

        const docItems = documentationLinks.length
          ? documentationLinks.map((href) => `<li><a href="${href}" target="_blank" rel="noopener noreferrer">${href}</a></li>`).join("")
          : "<li>No additional documentation links found.</li>";

        card.innerHTML = `
          <div class="card-header">Azure Service: ${product}</div>
          <div class="card-body">
            <h3 class="title">${item.title || "Untitled update"}</h3>
            <div class="meta">${normalizeStatus(item.status)} • ${toDateText(item.date)}</div>
            <div class="line"><strong>Announcement:</strong> <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.url}</a></div>
            <div class="line"><strong>Documentation:</strong></div>
            <ul class="links">${docItems}</ul>
          </div>
        `;

        cardsEl.appendChild(card);
      }
    }

    loadReport().catch((error) => {
      const weekLabelEl = document.getElementById("week-label");
      weekLabelEl.textContent = `Failed to load report: ${error.message}`;
    });
  </script>
</body>
</html>
